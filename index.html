<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor | SAP Consultant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .badge { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); color: #38bdf8; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-xl w-full">
        
        <!-- SITE IN PROGRESS TAG -->
        <div class="flex justify-center mb-6">
            <span class="text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full border border-yellow-500/30 text-yellow-500 bg-yellow-500/5">
                🚧 Portfolio in Progress — Updated Daily
            </span>
        </div>

        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-sky-400 to-emerald-400 bg-clip-text text-transparent mb-2">Victor</h1>
            <p class="text-slate-400 text-lg">SAP Technical Consultant | ABAP Developer</p>
        </header>

        <main class="space-y-4">
            <!-- FEATURED PROJECT -->
            <div class="glass p-6 rounded-2xl flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold">Latest ABAP Project</h2>
                    <p class="text-sm text-slate-500">S/4HANA Technical Repository</p>

                <a href="https://github.com/victor-sap/sugarchain" class="bg-sky-500 hover:bg-sky-600 px-5 py-2 rounded-full text-sm font-bold transition">View Code</a>
            </div>

            <!-- CERTIFICATIONS SECTION -->
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4">Core Certifications</h2>
                <div class="space-y-3">
                    <!-- Cert 1 -->
                    <div class="flex items-center justify-between group">
                        <span class="text-sm font-medium group-hover:text-sky-400 transition">SAP Certified Development Associate</span>
                        <a href="https://www.credly.com/badges/7f9dfb8a-8c52-4809-a09f-626276a27cd7/public_url" class="text-[10px] text-slate-500 underline hover:text-white">Verify</a>
                    </div>
                </div>
            </div>

            <!-- PRIMARY LINKS -->
            <div class="grid grid-cols-2 gap-4">
                <a href="www.linkedin.com/in/victor-mihoc-5a5323255" class="glass p-4 rounded-2xl text-center hover:bg-white/5 transition font-bold text-sky-400">LinkedIn</a>
                <a href="https://github.com/victor-sap" class="glass p-4 rounded-2xl text-center hover:bg-white/5 transition font-bold">GitHub</a>
            </div>
            
            <a href="mailto:work@mvicbox.com" class="block glass p-4 rounded-2xl text-center hover:bg-white/5 transition text-sm text-slate-400">
                Email: work@mvicbox.com
            </a>
        </main>

        <footer class="mt-12 text-center text-slate-600 text-xs tracking-widest uppercase">
            mvicbox.com • 2026
        </footer>
    </div>
</body>
</html>
