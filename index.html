<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor | SAP Consultant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-xl w-full">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-sky-400 to-emerald-400 bg-clip-text text-transparent mb-2">Victor</h1>
            <p class="text-slate-400 text-lg">SAP Technical Consultant | ABAP Developer (4 YOE)</p>
        </header>

        <main class="space-y-4">
            <!-- THE SINGLE PROJECT CARD -->
            <div class="glass p-6 rounded-2xl flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold">Latest ABAP Project</h2>
                    <p class="text-sm text-slate-500">Technical Repo & Documentation</p>
                </div>
                <a href="https://github.com/victor-sap/YOUR-REPO-NAME" class="bg-sky-500 hover:bg-sky-600 px-5 py-2 rounded-full text-sm font-bold transition">View Code</a>
            </div>

            <!-- QUICK LINKS -->
            <div class="grid grid-cols-2 gap-4">
                <a href="https://github.com/victor-sap" class="glass p-4 rounded-2xl text-center hover:bg-white/5 transition">GitHub Profile</a>
                <a href="mailto:hello@mvicbox.com" class="glass p-4 rounded-2xl text-center hover:bg-white/5 transition">Email Me</a>
            </div>
        </main>

        <footer class="mt-12 text-center text-slate-600 text-xs tracking-widest uppercase">
            mvicbox.com • 2026
        </footer>
    </div>
</body>
</html>
